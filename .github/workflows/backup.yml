name: Firebase Backup

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Requests
        run: pip install requests

      - name: Run Backup Script
        run: python backup.py

      - name: Commit Backup
        run: |
          git config --global user.name "backup-bot"
          git config --global user.email "backup@github.com"
          git add backup.json
          git commit -m "Auto Firebase Backup"
          git push
